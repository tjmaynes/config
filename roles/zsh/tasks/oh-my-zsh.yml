---
- name: Check if Oh-my-zsh exists
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.oh-my-zsh"
  register: ohmyzsh_result

- name: Download Oh-my-zsh
  ansible.builtin.git:
    repo: "https://github.com/ohmyzsh/ohmyzsh.git"
    dest: "{{ ansible_facts.env.HOME }}/.oh-my-zsh-temp"
    recursive: true
    accept_hostkey: false
    depth: 1
  when: not ohmyzsh_result.stat.exists

- name: Install Oh-my-zsh
  ansible.builtin.script:
    cmd: "{{ ansible_facts.env.HOME }}/.oh-my-zsh-temp/tools/install.sh"
  when: not ohmyzsh_result.stat.exists

- name: Install zsh plugins
  ansible.builtin.git:
    repo: "https://github.com/zsh-users/{{ item }}.git"
    dest: "{{ ansible_facts.env.HOME }}/.oh-my-zsh/custom/plugins/{{ item }}"
    recursive: true
    accept_hostkey: false
    depth: 1
  loop:
    - zsh-autosuggestions
    - zsh-completions
    - zsh-syntax-highlighting
