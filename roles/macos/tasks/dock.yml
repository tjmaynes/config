---
- name: Make Dock icons of hidden applications translucent
  when: dock_make_hidden_apps_translucent is not none
  community.general.osx_defaults:
    domain: com.apple.dock
    key: showhidden
    type: bool
    value: "{{ dock_make_hidden_apps_translucent | bool }}"
  notify: Restart Dock

- name: Show indicator lights for open applications in the Dock
  when: dock_show_indicator_lights_for_open_apps is not none
  community.general.osx_defaults:
    domain: com.apple.dock
    key: show-process-indicators
    type: bool
    value: "{{ dock_show_indicator_lights_for_open_apps | bool }}"
  notify: Restart Dock

- name: Set the icon size of Dock items to {{ dock_tilesize }}px
  when: dock_tilesize is not none
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: float
    value: "{{ dock_tilesize }}"
  notify: Restart Dock

- name: Don't show recent applications in Dock
  community.general.osx_defaults:
    domain: com.apple.dock
    key: show-recents
    type: bool
    value: false
  notify: Restart Dock
