---
- name: Restart Finder
  ansible.builtin.command: killall Finder
  changed_when: true

- name: Restart Dock
  ansible.builtin.command: killall Dock
  changed_when: true

- name: Restart Safari
  ansible.builtin.command: osascript -e 'quit app "Safari"' && osascript -e 'tell application "Safari" to activate'
  changed_when: true
