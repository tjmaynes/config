---
# Homebrew
homebrew_taps: []
homebrew_installed_packages: []
homebrew_cask_apps: []
homebrew_cask_appdir: /Applications
homebrew_clear_cache: false

# Mac App Store
mas_installed_apps: []

# Hostname
computername: null
hostname: null

# System
system_save_application_state_on_quit: null
system_expand_save_panel_by_default: null
system_expand_print_panel_by_default: null
system_show_file_extensions_warning: null
system_warn_before_emptying_the_trash: null
system_use_f_keys_as_standard_function_keys: null
system_index_network_storage_with_spotlight: null

# Screen
screensaver_ask_for_password: null
screensaver_ask_for_password_in_seconds: null

# Ssh
configure_ssh: false
ssh_keys: []

# Services - code-server
code_server_bind_addr: "0.0.0.0:9000"
code_server_auth: password
code_server_password: "changeme"
code_server_cert: false

# Services - immich-ml
immich_ml_dir: "{{ ansible_facts.env.HOME }}/workspace/services/immich-ml"
immich_ml_python_version: "3.11.11"
