---
- name: Ensure vim is installed
  ansible.builtin.command: which vim
  register: vim_result
  failed_when: vim_result.rc != 0
  changed_when: false

- name: Ensure gpg is installed
  ansible.builtin.command: which gpg
  register: gpg_result
  failed_when: gpg_result.rc != 0
  changed_when: false

- name: Ensure git-delta is installed
  ansible.builtin.command: which delta
  register: delta_result
  failed_when: delta_result.rc != 0
  changed_when: false

- name: Updating git global config values
  community.general.git_config:
    name: "{{ item.name }}"
    scope: global
    value: "{{ item.value }}"
  loop: "{{ git_configs }}"
